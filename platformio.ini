[platformio]
default_envs = tx

[env]
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.filesystem = spiffs

build_flags =
    -D LOG_LOCAL_LEVEL=ESP_LOG_INFO
    -I lib/audio/include
    -I lib/network/include
    -I managed_components/espressif__esp_tinyusb/include
    -Wno-error=stringop-overflow

[env:tx]
platform = espressif32@~6.6.0
framework = espidf
board = seeed_xiao_esp32s3
board_build.sdkconfig = sdkconfig.tx.defaults
upload_port = /dev/cu.usbmodem101
extra_scripts = pre:extra_script.py
build_flags = 
    ${env.build_flags}
    -D CONFIG_TX_BUILD
    -D CONFIG_USE_ES8388

[env:rx]
platform = espressif32@~6.6.0
framework = espidf
board = seeed_xiao_esp32s3
board_build.sdkconfig = sdkconfig.rx.defaults
upload_port = /dev/cu.usbmodem2101
extra_scripts = pre:extra_script.py
build_flags = 
    ${env.build_flags}
    -D CONFIG_RX_BUILD
    -D CONFIG_USE_ES8388

[env:combo]
platform = espressif32@~6.6.0
framework = espidf
board = seeed_xiao_esp32s3
board_build.sdkconfig = sdkconfig.combo.defaults
upload_port = /dev/cu.usbmodem101
extra_scripts = pre:extra_script.py
build_flags = 
    ${env.build_flags}
    -D CONFIG_COMBO_BUILD
    -D CONFIG_USE_ES8388

[env:native]
platform = native
test_framework = unity
test_build_src = no
lib_ignore = audio, network, control, config
build_flags =
    -I lib/audio/include
    -I lib/network/include
